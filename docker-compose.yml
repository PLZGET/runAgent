services:
  backend:
    build:
      context: ./backend
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    ports:
      - "8002:8000"

  frontend:
    build:
      context: ./frontend
    environment:
      BACKEND_INTERNAL_URL: http://backend:8000
    ports:
      - "3002:3002"
    depends_on:
      - backend
